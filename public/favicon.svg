<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)" />
  
  <!-- Inner white circle -->
  <circle cx="50" cy="50" r="38" fill="white" />
  
  <!-- Cake icon -->
  <rect x="35" y="55" width="30" height="18" rx="3" fill="#10b981" />
  <rect x="35" y="50" width="30" height="8" rx="2" fill="#059669" />
  
  <!-- Candle -->
  <rect x="47" y="35" width="6" height="18" rx="2" fill="#f59e0b" />
  
  <!-- Flame -->
  <ellipse cx="50" cy="33" rx="4" ry="6" fill="#f59e0b" />
  <ellipse cx="50" cy="31" rx="2" ry="3" fill="#fbbf24" />
  
  <!-- Frosting dots -->
  <circle cx="40" cy="58" r="2" fill="white" />
  <circle cx="50" cy="56" r="2" fill="white" />
  <circle cx="60" cy="58" r="2" fill="white" />
</svg>
